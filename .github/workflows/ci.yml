name: CI

on:
  pull_request:
    branches: [main, development]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install infra dependencies
        run: cd infra && npm ci

      - name: Synth CDK (dev)
        run: cd infra && npx cdk synth -c env=dev
